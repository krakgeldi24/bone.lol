<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bone.lol | Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* TEMEL STİLLER (Guns.lol Tarzı Karanlık Tema) */
        body {
            margin: 0;
            padding: 0;
            background-color: #080808; /* Çok koyu gri/siyah */
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Müzik autoplay için gerekebilir */
        }

        /* ANA KONTEYNER */
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03); /* Çok hafif şeffaf arka plan */
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px); /* Arka planı hafif bulanıklaştır */
        }

        /* PROFİL LOGOSU */
        .profile-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #111; /* Logo yoksa siyah daire */
            border: 2px solid #fff;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: 600;
            color: #fff;
            text-transform: uppercase;
        }

        /* BAŞLIK VE KULLANICI ADI */
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 10px;
        }

        .username {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
            display: block;
        }

        /* BUTON STİLLERİ */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background-color: #111; /* Buton arka planı */
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            font-size: 15px;
            font-weight: 400;
            position: relative;
        }

        /* Buton Hover Efekti */
        .link-btn:hover {
            background-color: #fff;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        /* Buton İkonları */
        .link-btn i {
            margin-right: 10px;
            font-size: 18px;
            position: absolute;
            left: 20px;
        }

        /* MÜZİK PLAYER (GİZLİ) */
        #music-player {
            display: none;
        }

        /* Müzik Kontrol Butonu (İsteğe bağlı, ekranın köşesinde durur) */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <audio id="music-player" loop>
        <source src="https://files.catbox.moe/p9qj0v.mp3" type="audio/mpeg">
        Tarayıcınız müzik çalmayı desteklemiyor.
    </audio>

    <button class="music-control" onclick="toggleMusic()">
        <i id="music-icon" class="fas fa-play"></i>
    </button>

    <div class="container">
        <div class="profile-logo">B</div>

        <h1>bone.lol</h1>
        <span class="username">@krakgeldi24</span>

        <div class="links-container">
            <a href="https://youtube.com/@the_bonehub" target="_blank" class="link-btn">
                <i class="fab fa-youtube"></i> The Bonehub
            </a>

            <a href="https://youtube.com/@b0neb0ll" target="_blank" class="link-btn">
                <i class="fab fa-youtube"></i> b0neb0ll
            </a>

            <a href="https://discord.gg/XWCW6khN6" target="_blank" class="link-btn">
                <i class="fab fa-discord"></i> Discord Sunucusu
            </a>

            <a href="https://open.spotify.com/artist/0" target="_blank" class="link-btn">
                <i class="fab fa-spotify"></i> Spotify
            </a>

            <a href="https://www.roblox.com/tr/users/5428258131/profile?friendshipSourceType=PlayerSearch" target="_blank" class="link-btn">
                <i class="fas fa-gamepad"></i> Roblox Profil 1
            </a>

            <a href="https://www.roblox.com/tr/users/2507672942/profile?friendshipSourceType=PlayerSearch" target="_blank" class="link-btn">
                <i class="fas fa-gamepad"></i> Roblox Profil 2
            </a>

            <a href="https://www.roblox.com/tr/users/5862029625/profile?friendshipSourceType=PlayerSearch" target="_blank" class="link-btn">
                <i class="fas fa-gamepad"></i> Roblox Profil 3
            </a>
        </div>
    </div>

    <script>
        // Müzik kontrol fonksiyonu
        var audio = document.getElementById("music-player");
        var icon = document.getElementById("music-icon");

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                icon.classList.remove("fa-play");
                icon.classList.add("fa-pause");
            } else {
                audio.pause();
                icon.classList.remove("fa-pause");
                icon.classList.add("fa-play");
            }
        }

        // Sayfa yüklendiğinde müziği başlatmayı dene (tarayıcı izin verirse)
        window.addEventListener('load', function() {
            // Birçok tarayıcı bunu engelleyecektir, kullanıcı bir yere tıklamalıdır.
            // Bu yüzden sağ alttaki butona basılması gerekebilir.
            audio.play().catch(function(error) {
                console.log("Otomatik oynatma engellendi, lütfen oynat butonuna basın.");
            });
        });
    </script>

</body>
</html>
