<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@ B O N E</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GENEL AYARLAR */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* VİDEO ARKA PLAN */
        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.8); /* Videoyu hafif karartır */
        }

        /* BEYAZ DAİRE İMLEÇ */
        #cursor {
            width: 10px; height: 10px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px rgba(255, 255, 255, 1);
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
        }

        /* GİRİŞ EKRANI */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            transition: opacity 1.5s ease;
        }
        #overlay span { 
            font-size: 13px; color: #fff; letter-spacing: 5px; 
            border: 1px solid rgba(255,255,255,0.2); padding: 12px 30px;
            text-transform: uppercase;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(5px);
        }

        /* ANA İÇERİK (KOMPAKT) */
        #main { opacity: 0; transition: opacity 2s ease; text-align: center; z-index: 10; display: flex; flex-direction: column; align-items: center;}
        
        /* PROFİL RESMİ */
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* BAŞLIK VE ALT BAŞLIK */
        .title { font-size: 60px; font-weight: 900; letter-spacing: 15px; margin-bottom: 5px; text-shadow: 0 0 30px rgba(255,255,255,0.3); }
        .subtitle { font-size: 12px; letter-spacing: 8px; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 40px; }

        /* SOSYAL MEDYA BAR (TEMİZ) */
        .social-bar {
            display: flex; gap: 30px; justify-content: center; 
            background: rgba(0,0,0,0.3); padding: 18px 40px; border-radius: 100px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .social-bar a { color: #fff; font-size: 22px; transition: 0.4s ease; opacity: 0.5; text-decoration: none; }
        .social-bar a:hover { opacity: 1; transform: translateY(-5px) scale(1.2); text-shadow: 0 0 15px #fff; }

        /* KAR YAĞMA EFEKTİ */
        #snow-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <div id="overlay" onclick="startSite()">
        <span>Click to enter</span>
    </div>

    <video id="bg-video" loop muted playsinline>
        <source src="dark-queen-knight-moewalls-com (online-video-cutter.com) (1).mp4" type="video/mp4">
    </video>

    <audio id="music" loop>
        <source src="DEHA INC. - ALÆCARTE-X (Official Music Video).mp3" type="audio/mpeg">
    </audio>

    <canvas id="snow-canvas"></canvas>

    <div id="main">
        <div class="profile-pic">
            <img src="pfp.jpg" alt="Profile Picture">
        </div>

        <h1 class="title">B O N E</h1>
        
        <p class="subtitle">@bwne</p>

        <div class="social-bar">
            <a href="https://youtube.com/@the_bonehub" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://youtube.com/@b0neb0ll" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://discord.gg/XWCW6khN6" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="http://googleusercontent.com/spotify.com/6" target="_blank"><i class="fab fa-spotify"></i></a>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        const video = document.getElementById('bg-video');
        const audio = document.getElementById('music');

        // Mouse Takibi ve Tıklama Efekti
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => cursor.style.transform = 'translate(-50%, -50%) scale(0.7)');
        document.addEventListener('mouseup', () => cursor.style.transform = 'translate(-50%, -50%) scale(1)');

        // Giriş Fonksiyonu
        function startSite() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main').style.opacity = '1';
                video.play();
                audio.play();
            }, 1000);
        }

        // Sekme Başlığı Animasyonu (@bwne sağa sola gidiyor)
        let titleText = "@bwne ";
        let position = 0;
        let direction = 1;

        setInterval(() => {
            let displayTitle = titleText.substring(0, position);
            document.title = displayTitle || "@"; 
            position += direction;
            if (position >= titleText.length || position <= 0) direction *= -1;
        }, 300);

        // Kar Yağışı (Canvas Particle System)
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.2;
                this.speed = Math.random() * 0.8 + 0.2;
                this.opacity = Math.random();
            }
            update() { this.y += this.speed; if (this.y > canvas.height) this.y = -5; }
            draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }

        for (let i = 0; i < 120; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
